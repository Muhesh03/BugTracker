<div class="page-scroll-container">
  <div class="maindiv ">

    <button mat-raised-button class="create-btn mb-2 mt-2"
      style="background-color:var(--tablebutton-color);;color: white;" (click)="openUserGroupDialog()">
      Create Usergroup
    </button>

    <div class="table-wrapper mat-elevation-z6 ">

      <table mat-table [dataSource]="DataSource" class="mat-table usergroup-table">

        <!-- S.No -->
        <ng-container matColumnDef="sno">
          <th mat-header-cell *matHeaderCellDef class="col-si-no">S.No</th>
          <td mat-cell *matCellDef="let row; let i = index" class="col-si-no">
            {{ i + 1 }}
          </td>
        </ng-container>

        <!-- Usergroup Name -->
        <ng-container matColumnDef="usergroupname">
          <th mat-header-cell *matHeaderCellDef class="col-name">
            Usergroup Name
          </th>
          <td mat-cell *matCellDef="let row" class="col-name">
            {{ row.usergroupname }}
          </td>
        </ng-container>

        <!-- Permission -->
        <ng-container matColumnDef="permission">
          <th mat-header-cell *matHeaderCellDef class="col-actions">
            Permission
          </th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <button mat-icon-button class="action-btn permission" (click)="openPermissionDialog(row)">
              <mat-icon>key</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Edit -->
        <ng-container matColumnDef="edit">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Edit</th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <button mat-icon-button class="action-btn edit" (click)="editusergroup(row)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Delete -->
        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Delete</th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <button mat-icon-button class="action-btn delete" (click)="deleteUserGroup(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>

      <mat-paginator [pageSizeOptions]="[5,10,20]" [pageSize]="10" showFirstLastButtons>
      </mat-paginator>

    </div>

  </div>
</div>
