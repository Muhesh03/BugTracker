<div class="contentpage">

  <div class="w-100 d-flex flex-wrap align-items-start justify-content-start mt-2 mb-3 gap-3">
    <div class="pdiv">
      <button mat-raised-button (click)="openUserDialog()" class="pbtn">
        Create User
      </button>
    </div>
  </div>

  <div class="tablewrapper">

    <table mat-table [dataSource]="dataSource" matSort class="mat-table">

      <!-- SI.No -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef class="col-si-no">SI.No</th>
        <td mat-cell *matCellDef="let row; let i = index" class="col-si-no">
          {{ i + 1 }}
        </td>
      </ng-container>

      <!-- User Name -->
      <ng-container matColumnDef="fullname">
        <th mat-header-cell *matHeaderCellDef>User Name</th>
        <td mat-cell *matCellDef="let row">
          {{ row.fullname }}
        </td>
      </ng-container>
      <!-- Attachment -->

      <!-- <ng-container matColumnDef="attachment">
      <th mat-header-cell *matHeaderCellDef class="col-group">Attachment</th>
      <td mat-cell *matCellDef="let row" class="col-group">
        {{ row.attachment_name }}
      </td>
    </ng-container> -->
      <!-- <ng-container matColumnDef="attachment">
      <th mat-header-cell *matHeaderCellDef>Attachment</th>

      <td mat-cell *matCellDef="let row">
        <ng-container *ngIf="row.attachment_name; else noFile">
          <mat-icon style="cursor:pointer;color:#1976d2" (click)="viewAttachment(row.attachment_name)">
            visibility
          </mat-icon>
        </ng-container>

        <ng-template #noFile>-</ng-template>
      </td>
    </ng-container> -->
      <ng-container matColumnDef="attachment">
        <th mat-header-cell *matHeaderCellDef class="col-actions">Attachment</th>

        <td mat-cell *matCellDef="let row" class="col-actions ">

          <button *ngIf="row.attachment_name" mat-icon-button color="primary"
            (click)="viewAttachment(row.attachment_name)">
            <mat-icon>attach_file</mat-icon>
          </button>

          <span *ngIf="!row.attachment_name">—</span>

        </td>
      </ng-container>

      <!-- Group -->
      <ng-container matColumnDef="usergroup">
        <th mat-header-cell *matHeaderCellDef class="col-group">Group</th>
        <td mat-cell *matCellDef="let row" class="col-group">
          {{ row.usergroupname }}
        </td>
      </ng-container>

      <!-- Status -->
      <!-- <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Status</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <mat-slide-toggle [checked]="row.status === 1" (change)="onStatusToggle(row, $event.checked)">
        </mat-slide-toggle>
      </td>
    </ng-container> -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="col-actions">Status</th>
        <td mat-cell *matCellDef="let row" class="col-actions">
          <mat-slide-toggle [checked]="row.status_id === 1" (change)="onStatusToggle(row, $event)"
            [disabled]="row.user_id === 1 || row.user_id === 2">
          </mat-slide-toggle>
        </td>
      </ng-container>


      <!-- Edit -->
      <ng-container matColumnDef="edit">
        <th mat-header-cell *matHeaderCellDef class="col-actions">Edit</th>
        <td mat-cell *matCellDef="let row" class="col-actions">
          <button mat-icon-button class="action-btn edit" (click)="editUser(row)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Delete -->
      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef class="col-actions">Delete</th>
        <td mat-cell *matCellDef="let row" class="col-actions">
          <!-- <button mat-icon-button class="action-btn delete" (click)="deleteuser(row)">
          <mat-icon>delete</mat-icon>
        </button> -->
          <button mat-icon-button class="action-btn delete" (click)="deleteuser(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
    <div class="paginator">
      <mat-paginator [pageSizeOptions]="[20, 40, 60]" [pageSize]="20" showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>


</div>
