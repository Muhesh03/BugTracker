<mat-toolbar class="dialog-toolbar">
    <h2 class="text-center">
        Attachment Preview
    </h2>
    <button mat-icon-button (click)="close()" aria-label="Close dialog">
        <mat-icon>close</mat-icon>
    </button>
</mat-toolbar>

<mat-dialog-content>
    <div class="popupimg-container">
        <img [src]="data.imageUrl" alt="Attachment" />
    </div>
</mat-dialog-content>
