<div class="mainfilterdiv sticky-filter">
  <!-- Left Flex Container for Create Ticket Button -->
  <div class="left-container">
    <button mat-raised-button class="filterbutton" (click)="openLiveTicketDialog()">
      Create Client Ticket
    </button>
  </div>

  <div class="page-scroll-container">
    <div class="table-wrapper mat-elevation-z6">
      <table mat-table [dataSource]="liveticketDataSource" class="liveticket-table mat-elevation-z8">

        <!-- Ticket Number -->
        <ng-container matColumnDef="ticket_number">
          <th mat-header-cell *matHeaderCellDef> Ticket No </th>
          <td mat-cell *matCellDef="let row">
            {{ row.ticket_number }}
          </td>
        </ng-container>

        <ng-container matColumnDef="image_path">
          <th mat-header-cell *matHeaderCellDef>Attachment</th>

          <td mat-cell *matCellDef="let row">

            <!-- show icons equal to number of images -->
            <ng-container *ngIf="row.image_path && row.image_path.length">
              <mat-icon *ngFor="let img of row.image_path" class="image-icon" (click)="openImages([img])"
                title="View Image" style="color:#547562">
                image
              </mat-icon>
            </ng-container>
            <span *ngIf="!row.image_path || row.image_path.length === 0">
              —
            </span>
          </td>
        </ng-container>

        <!-- Summary -->
        <ng-container matColumnDef="summary">
          <th mat-header-cell *matHeaderCellDef> Summary </th>
          <td mat-cell *matCellDef="let row">
            {{ row.summary }}
          </td>
        </ng-container>

        <!-- Description -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Description </th>
          <td mat-cell *matCellDef="let row">
            {{ row.description }}
          </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef> Action </th>
          <td mat-cell *matCellDef="let row">

            <button mat-icon-button color="primary" (click)="editLiveTicket(row)">

              <mat-icon>assignment</mat-icon>

            </button>

          </td>
        </ng-container>


        <ng-container matColumnDef="update">
          <th mat-header-cell *matHeaderCellDef> update</th>
          <td mat-cell *matCellDef="let row">

            <button mat-icon-button color="primary" (click)="updateLiveTicket(row)">

              <mat-icon>assignment</mat-icon>

            </button>

          </td>
        </ng-container>

        <!-- Instance -->
        <ng-container matColumnDef="instance">
          <th mat-header-cell *matHeaderCellDef> Instance </th>
          <td mat-cell *matCellDef="let row">
            {{ row.instance }}
          </td>
        </ng-container>

        <!-- Unit -->
        <ng-container matColumnDef="unit">
          <th mat-header-cell *matHeaderCellDef> Unit </th>
          <td mat-cell *matCellDef="let row">
            {{ row.unit }}
          </td>
        </ng-container>


        <ng-container matColumnDef="tag_names">
          <th mat-header-cell *matHeaderCellDef>Tags</th>
          <td mat-cell *matCellDef="let row">
            <span class="tag-names" *ngIf="row.tag_names?.length; else noTags">
              {{ row.tag_names.join(', ') }}
            </span>
            <ng-template #noTags>—</ng-template>
          </td>
        </ng-container>


        <!-- Priority -->
        <ng-container matColumnDef="priority_id">
          <th mat-header-cell *matHeaderCellDef> Priority </th>
          <td mat-cell *matCellDef="let row">
            {{ row.priority }}
          </td>
        </ng-container>

        <!-- Status -->
        <ng-container matColumnDef="status_id">
          <th mat-header-cell *matHeaderCellDef> Type</th>
          <td mat-cell *matCellDef="let row">
            {{ row.ticket_type_name }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns ;sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>

      <mat-paginator [pageSizeOptions]="[5,20,40,60]" [pageSize]="20" showFirstLastButtons
        style="display: flex; justify-content: center;">
      </mat-paginator>
    </div>
  </div>
