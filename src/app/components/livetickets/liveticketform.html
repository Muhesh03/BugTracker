<div class="firstdiv" style="background-color: var(--formbutton-color);color: var(--formcontent-color);">
  <h2 class="firstdivheading" style="color: hsl(200, 18%, 97%);">
    Create Client Ticket Information
  </h2>

  <button mat-icon-button class="close-btn" type="button">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="form-scroll-container">
  <form class="min-form" [formGroup]="liveticketform"  (ngSubmit)="onSubmit()">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="tickettype_id">
        <mat-option *ngFor="let t of tickettypes" [value]="t.tickettype_id">
          {{ t.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Priority</mat-label>

      <mat-select formControlName="priority_id">
        <mat-select-trigger>
          <mat-icon [style.color]="iconMap[selectedPriority?.icon]?.color"
            style="margin-right:6px; vertical-align:middle;">
            {{ iconMap[selectedPriority?.icon]?.name }}
          </mat-icon>
          {{ selectedPriority?.priority }}
        </mat-select-trigger>

        <mat-option *ngFor="let p of priorities" [value]="p.priority_id">
          <mat-icon [style.color]="iconMap[p.icon]?.color" style="margin-right:6px; vertical-align:middle;">
            {{ iconMap[p.icon]?.name }}
          </mat-icon>
          {{ p.priority }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="ticketstatus_id">
        <mat-option *ngFor="let s of statuses" [value]="s.ticketstatus_id">
          {{ s.statusname }}
        </mat-option>
      </mat-select>
    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Instance</mat-label>
      <input matInput formControlName="instance">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Unit</mat-label>
      <input matInput formControlName="unit">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Summary</mat-label>
      <input matInput formControlName="summary">
    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tags</mat-label>
      <mat-select formControlName="ticket_tag" multiple>
        <mat-option *ngFor="let t of tags" [value]="t.tickettag_id">
          {{ t.tickettag }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Steps to Reproduce -->
    <mat-form-field appearance="outline" class="full-width steps-field">
      <mat-label>Steps to Reproduce</mat-label>
      <textarea matInput rows="4" placeholder="1. Go to...
2. Click on...
3. Observe the issue..." formControlName="steps_to_reproduce">
  </textarea>
    </mat-form-field>
    <!-- FILE UPLOAD -->
    <div>
      <input type="file" accept="image/*" hidden #fileInput multiple (change)="onFileSelect($event)">

      <button mat-icon-button type="button" (click)="fileInput.click()">
        <mat-icon style="color:#547562;">attach_file</mat-icon>
      </button>
    </div>

    <!-- NEW FILES -->
    <div *ngFor="let name of selectedFileNames; let i = index" class="text-size">
      📎 {{ name }}
     <button color="primary" type="button" (click)="removeFile(i)">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="button-container">
      <button mat-raised-button class="cancel-button" type="button" (click)="cancel()">
        Cancel
      </button>

      <div class="project-button-div">
        <button mat-raised-button class="save-button" type="submit">
          Save
        </button>
      </div>
    </div>
  </form>
</div>
