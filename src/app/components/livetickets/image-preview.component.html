<div class="image-dialog-header">
  <h2 style="color:rgb(39, 41, 39)">Image Preview</h2>
  <mat-icon style="color:rgb(74, 80, 74);font-size:40px;" (click)="onClose()">cancel</mat-icon>
</div>
<div class="img-wrapper" *ngFor="let img of images">
  <img
    [src]="env.ServerApi + 'uploads/' + img"
    class="image"
  />
</div>
