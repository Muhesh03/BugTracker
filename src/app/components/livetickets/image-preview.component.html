<mat-toolbar class="dialog-toolbar">
  <h2>Image Preview</h2>
  <button mat-icon-button class="closebtn" (click)="onClose()" type="button">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>

<mat-dialog-content>
  <div class="popupimg-container" *ngFor="let img of images">
    <img [src]="env.ServerApi + 'uploads/' + img" />
  </div>
</mat-dialog-content>
