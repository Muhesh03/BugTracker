<div class="contentpage">

  <div class="w-100 d-flex flex-wrap align-items-start justify-content-start mt-2 mb-3 gap-3">
    <div class="pdiv">
      <button type="button" mat-raised-button (click)="openTicketStatusDialog()" class="pbtn">
        Create Status
      </button>
    </div>
  </div>

  <div class="tablewrapper">

    <table mat-table [dataSource]="dataSource" matSort class="mat-table compact-table sticky-header">

      <!-- SI.No -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-slno"> Sl.No </th>
        <td mat-cell *matCellDef="let element; let i = index" class="texet-center">
          {{ i + 1 }}
        </td>
      </ng-container>

      <!-- Full Name -->
      <!-- Added 'col-fullname' class -->
      <ng-container matColumnDef="statusname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-name"> Status Name </th>
        <td mat-cell *matCellDef="let element" class="col-status">
          {{ element.statusname }}
        </td>
      </ng-container>

      <!-- <ng-container matColumnDef="color">
      <th mat-header-cell *matHeaderCellDef> Color </th>
      <td mat-cell *matCellDef="let element">
        <span class="color-box" [style.background]="element.color"></span>
        {{ element.color }}
      </td>
    </ng-container> -->

      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef class="col-actions"> Color </th>
        <td mat-cell *matCellDef="let element" class="text-center">
          <div class="color-box" [style.backgroundColor]="element.color">
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="col-actions">Status</th>

        <td mat-cell *matCellDef="let row" class="text-center">
          <mat-slide-toggle [checked]="row.status_id === 1" (change)="onchangeStatus(row, $event.checked)"
            >
          </mat-slide-toggle>
        </td>
      </ng-container>

      <!-- 
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-group-status "> Status </th>
      <td mat-cell *matCellDef="let element" class="col-group-status">
        <span class="status-badge" [ngClass]="element.status === 'Active' ? 'active' : 'inactive'">
          <mat-icon>
            {{ element.status === 'Active' ? 'check_circle' : 'cancel' }}
          </mat-icon>
          {{ element.status }}
        </span>
      </td>
    </ng-container> -->

      <!-- Added 'col-actions' class -->
      <ng-container matColumnDef="edit">
        <th mat-header-cell *matHeaderCellDef class="col-actions "> Edit </th>
        <td mat-cell *matCellDef="let element" class="text-center ">
          <button mat-icon-button class="action-btn edit" (click)="editUser(element)"
            [disabled]="element.disabled === 4">
            <mat-icon>edit_note</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Delete -->
      <!-- Added 'col-actions' class -->
      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef class="col-actions "> Delete </th>
        <td mat-cell *matCellDef="let element" class="text-center ">
          <button mat-icon-button class="action-btn delete" (click)="deleteticketstatus(element)"
            [disabled]="element.disabled === 4">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <div class="paginator">
      <mat-paginator [pageSizeOptions]="[10,50,100]" [pageSize]="50" showFirstLastButtons>
      </mat-paginator>
    </div>

  </div>
</div>
