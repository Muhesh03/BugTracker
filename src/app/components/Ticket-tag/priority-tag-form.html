<mat-toolbar class="dialog-toolbar">
  <h2>
    {{ isEditMode ? 'Update Ticket Tag' : 'Create Ticket Tag' }}
  </h2>
  <button mat-icon-button class="closebtn" (click)="onClose()">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>

<mat-dialog-content>
  <form [formGroup]="tickettagform" id="tickettagform" (ngSubmit)="onSubmit()">

    <div class="col-12 col-md-12 mb-1 fields px-0">
      <mat-form-field appearance="outline">
        <mat-label>Ticket Tag</mat-label>
        <input matInput formControlName="tickettag" placeholder="Enter Ticket Tag">

        <mat-error *ngIf="tickettagform.get('tickettag')?.hasError('required')">
          Ticket Tag is required
        </mat-error>

        <mat-error *ngIf="tickettagform.get('tickettag')?.hasError('duplicate')">
          Ticket Tag already exists
        </mat-error>
      </mat-form-field>
    </div>

    <div class="col-12 col-md-12 mb-1 fields px-0">
      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status_id">
          <mat-option [value]="1">Active</mat-option>
          <mat-option [value]="2">Inactive</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Description Field -->
    <div class="col-12 col-md-12 mb-1 fields px-0">
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="remarks" rows="4" placeholder="Enter description"></textarea>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-raised-button class="pbtn" type="submit" form="tickettagform">
    {{ isEditMode ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
