<div class="contentpage">

    <div class="w-100 d-flex flex-wrap align-items-start justify-content-start mt-2 mb-3 gap-3">
        <div class="pdiv">
            <button type="button" mat-raised-button (click)="openTicketTypeDialog()" class="pbtn">
                Create Type
            </button>
        </div>
    </div>

    <div class="tablewrapper">

        <table mat-table [dataSource]="dataSource" matSort class="mat-table compact-table sticky-header">

            <!-- SI.No -->
            <ng-container matColumnDef="position">
                <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-si-no"> SI.No </th>
                <td mat-cell *matCellDef="let element; let i = index" class="col-si-no">
                    {{ i + 1 }}
                </td>
            </ng-container>

            <!-- Added 'col-fullname' class -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-name"> Name </th>
                <td mat-cell *matCellDef="let element" class="col-name">
                    {{ element.name }}
                </td>
            </ng-container>
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef class="col-actions">Status</th>

                <td mat-cell *matCellDef="let row" class="col-actions">
                    <mat-slide-toggle [checked]="row.status_id ===1" (change)="onchangeStatus(row, $event.checked)"
                        [disabled]="row.status_id === 4">
                    </mat-slide-toggle>
                </td>
            </ng-container>
            <ng-container matColumnDef="edit">
                <th mat-header-cell *matHeaderCellDef class="col-actions"> Edit </th>
                <td mat-cell *matCellDef="let element" class="col-actions ">
                    <button mat-icon-button class="action-btn edit" (click)="editTicket(element)"
                        [disabled]="element.disabled === 4">
                        <mat-icon>edit</mat-icon>
                    </button>
                </td>
            </ng-container>

            <!-- Delete -->
            <!-- Added 'col-actions' class -->
            <ng-container matColumnDef="delete">
                <th mat-header-cell *matHeaderCellDef class="col-actions"> Delete </th>
                <td mat-cell *matCellDef="let element" class="col-actions ">
                    <button mat-icon-button class="action-btn delete" (click)="deleteTicket(element)"
                        [disabled]="element.disabled === 4">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>

        <div class="paginator">
            <mat-paginator [pageSizeOptions]="[5,10,20]" [pageSize]="10" showFirstLastButtons>
            </mat-paginator>
        </div>

    </div>
</div>
